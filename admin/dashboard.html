<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FOXCARS Admin — Tableau de bord</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="assets/admin.css">
</head>
<body>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../actifs/logo.png" alt="FOXCARS">
      <div class="brand-text">
        <strong>FOXCARS</strong>
        <span>Administration</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Tableau de bord
      </a>
      <a href="clients.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          <path d="M21 21v-2a4 4 0 0 0-3-3.85"/>
        </svg>
        Clients
      </a>
      <a href="inspection-form.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Nouvelle inspection
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="admin-badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
        <div>
          <div class="admin-name" id="admin-name">…</div>
          <div class="admin-role">Admin</div>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-ghost btn-sm" style="width:100%;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Tableau de bord</span>
      <a href="inspection-form.html" class="btn btn-sm">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Nouvelle inspection
      </a>
    </header>

    <div class="page-body">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="card stat-card"><div class="stat-label">Clients</div><div class="stat-value" id="stat-clients">–</div></div>
        <div class="card stat-card"><div class="stat-label">Ce mois</div><div class="stat-value" id="stat-month">–</div><div class="stat-sub">inspections</div></div>
        <div class="card stat-card"><div class="stat-label">En cours</div><div class="stat-value" id="stat-inprogress" style="color:var(--yellow)">–</div></div>
        <div class="card stat-card"><div class="stat-label">Terminées</div><div class="stat-value" id="stat-completed" style="color:var(--green)">–</div></div>
      </div>

      <!-- Filtres -->
      <div class="filter-bar">
        <button class="filter-tab active" data-status="all">Toutes</button>
        <button class="filter-tab" data-status="in_progress">En cours</button>
        <button class="filter-tab" data-status="completed">Terminées</button>
        <button class="filter-tab" data-status="transmitted">Transmises</button>
        <input type="search" class="search-input" id="search-input" placeholder="Rechercher véhicule, client…">
      </div>

      <!-- Tableau -->
      <div id="loading" class="spinner-wrap"><div class="spinner"></div></div>

      <div id="content" style="display:none;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Véhicule</th>
                <th>Plaque</th>
                <th>Client</th>
                <th>Date</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inspections-body"></tbody>
          </table>
        </div>
        <div id="empty-state" class="empty-state" style="display:none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
          <h3>Aucune inspection</h3>
          <p>Créez votre première inspection.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/config.js"></script>
<script src="assets/admin-auth.js"></script>
<script src="assets/dashboard.js"></script>
<script>
(async function () {
  const auth = await requireAdmin();
  if (!auth) return;
  renderAdminHeader();
  await loadDashboard();
})();
</script>

</body>
</html>
