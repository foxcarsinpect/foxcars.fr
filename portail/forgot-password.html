<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FOXCARS — Mot de passe oublié</title>
  <meta name="description" content="Réinitialisez votre mot de passe FOXCARS.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="assets/portal.css">
</head>
<body>

<div class="login-page">
  <div class="card login-box">

    <div class="login-logo">
      <img src="../actifs/logo.png" alt="FOXCARS">
      <div class="title">
        <strong>FOXCARS</strong>
        <span>Inspection automobile indépendante</span>
      </div>
    </div>

    <h1 class="login-title">Mot de passe oublié</h1>
    <p class="login-subtitle">
      Saisissez votre adresse e-mail. Nous vous enverrons un lien pour réinitialiser votre mot de passe.
    </p>

    <div id="success-msg" style="display:none; padding:16px; border-radius:12px;
      background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.3);
      color:#4ade80; font-size:14px; line-height:1.6; margin-bottom:16px;">
      ✅ Un e-mail de réinitialisation a été envoyé. Vérifiez votre boîte de réception (et vos spams).
    </div>

    <form id="forgot-form" novalidate>
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="votre@email.fr"
          autocomplete="email"
          required
        >
      </div>

      <button type="submit" id="submit-btn" class="btn btn-full">
        <span id="btn-text">Envoyer le lien</span>
        <span id="btn-spinner" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
          Envoi…
        </span>
      </button>

      <div id="error-msg" class="error-msg"></div>
    </form>

    <div style="margin-top:28px; padding-top:20px; border-top:1px solid var(--line); text-align:center;">
      <p style="margin:0; font-size:12px; color:var(--muted);">
        <a href="index.html" style="color:var(--orange-bright);">← Retour à la connexion</a>
      </p>
    </div>

  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/config.js"></script>
<script src="assets/auth.js"></script>
<script>
(async function () {
  // Redirige si déjà connecté
  await redirectIfLoggedIn();

  const form      = document.getElementById('forgot-form');
  const btn       = document.getElementById('submit-btn');
  const btnText   = document.getElementById('btn-text');
  const btnSpin   = document.getElementById('btn-spinner');
  const errorMsg  = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');

  function setLoading(on) {
    btn.disabled = on;
    btnText.style.display = on ? 'none' : '';
    btnSpin.style.display = on ? 'inline-flex' : 'none';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function hideError() {
    errorMsg.classList.remove('show');
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    hideError();
    successMsg.style.display = 'none';

    const email = document.getElementById('email').value.trim();

    if (!email) {
      showError('Veuillez saisir votre adresse e-mail.');
      return;
    }

    setLoading(true);
    try {
      await sendPasswordReset(email);
      form.style.display = 'none';
      successMsg.style.display = 'block';
    } catch (err) {
      showError('Impossible d\'envoyer l\'e-mail. Vérifiez l\'adresse saisie.');
      setLoading(false);
    }
  });
})();
</script>

</body>
</html>
